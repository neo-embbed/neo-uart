<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo UART Assistant</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-shape bg-a"></div>
  <div class="bg-shape bg-b"></div>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>Neo UART Assistant</h1>
        <p id="brandSubtitle" class="brand-subtitle" contenteditable="true" spellcheck="false">可自定义文字</p>
      </div>
      <div class="badge-group">
        <div id="healthBadge" class="badge">API Checking...</div>
        <div id="serialStatus" class="badge">串口未连接</div>
      </div>
    </header>

    <div class="split-layout">
      <section id="cards" class="cards-column">
        <div class="panel">
          <div class="panel-title">
            新增监测卡片
            <span class="hint-tooltip" data-tip="布尔型可用：正则; true=ON|OPEN; false=OFF|CLOSE">?</span>
          </div>
          <div class="card-form">
            <input id="cardName" placeholder="卡片名称，例如：温度报警" />
            <input id="cardPattern" placeholder="匹配规则（正则或关键词）" />
            <select id="cardType" title="卡片类型">
              <option value="numeric" selected>数值型</option>
              <option value="boolean">布尔型</option>
            </select>
            <input id="cardUnit" placeholder="单位（可选）" />
            <input id="cardColor" type="color" value="#0e7a68" title="卡片颜色" />
            <button id="createCardBtn" type="button" class="btn-primary">创建卡片</button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">已配置卡片 <span id="currentPresetLabel" class="panel-title-sub">（当前配置：未选择）</span></div>
          <div id="cardsList" class="cards-grid"></div>
        </div>
        <div class="panel">
          <div class="panel-title">卡片配置管理</div>
          <div class="preset-grid">
            <div class="field">
              <label for="presetName">保存名称</label>
              <input id="presetName" placeholder="例如：默认配置" />
            </div>
            <div class="buttons">
              <button id="savePresetBtn" class="btn-primary">保存配置</button>
            </div>
            <div class="field">
              <label for="presetSelect">已保存配置</label>
              <select id="presetSelect"></select>
            </div>
            <div class="buttons">
              <button id="loadPresetBtn">载入配置</button>
            </div>
          </div>
        </div>
      </section>

      <section class="serial-column">
        <nav class="tabs">
          <button class="tab active" data-tab="serial">串口助手</button>
          <button class="tab" data-tab="settings">系统设置</button>
        </nav>

        <section id="serial" class="tab-page active">
          <div class="panel controls">
            <div class="controls-row">
              <div class="field">
                <label for="portSelect">串口</label>
                <select id="portSelect"></select>
              </div>
              <div class="field">
                <label for="baudrate">波特率</label>
                <select id="baudrate">
                  <option>9600</option>
                  <option>57600</option>
                  <option selected>115200</option>
                  <option>230400</option>
                  <option>921600</option>
                </select>
              </div>
            </div>
            <div class="controls-row">
              <div class="field">
                <label for="customPort">手动端口（可选）</label>
                <input id="customPort" placeholder="例如：COM5" />
              </div>
            </div>
            <div class="controls-row">
              <div class="buttons">
                <button id="refreshPortsBtn">刷新串口</button>
                <button id="connectBtn" class="btn-primary">连接</button>
                <button id="disconnectBtn">断开</button>
              </div>
            </div>
          </div>

          <div class="panel terminal-panel">
            <div class="panel-title">通信日志</div>
            <div id="terminal" class="terminal"></div>
          </div>

          <div class="panel send-panel">
            <div class="field">
              <label for="sendMode">发送模式</label>
              <select id="sendMode">
                <option value="text" selected>Text</option>
                <option value="hex">Hex</option>
              </select>
            </div>
            <label class="checkbox-row">
              <input id="appendNewline" type="checkbox" />
              <span>发送 Text 时自动追加换行</span>
            </label>
            <textarea id="sendInput" placeholder="输入要发送的数据..."></textarea>
            <div class="buttons">
              <button id="clearTerminalBtn">清空日志</button>
              <button id="sendBtn" class="btn-primary">发送</button>
            </div>
          </div>
        </section>

        <section id="settings" class="tab-page">
          <div class="panel">
            <div class="panel-title">通信日志配色</div>
            <p class="panel-subtitle">支持字母、数字、标点的分色显示，可在此自定义。</p>
            <div class="settings-layout">
              <div class="settings-block">
                <div class="settings-grid">
                  <div class="field">
                    <label for="colorLetter">字母颜色</label>
                    <input id="colorLetter" type="color" value="#d8e8fb" />
                  </div>
                  <div class="field">
                    <label for="colorDigit">数字颜色</label>
                    <input id="colorDigit" type="color" value="#f4c780" />
                  </div>
                  <div class="field">
                    <label for="colorPunct">标点颜色</label>
                    <input id="colorPunct" type="color" value="#9de4b8" />
                  </div>
                  <div class="field">
                    <label for="colorTx">Tx报文颜色</label>
                    <input id="colorTx" type="color" value="#9de4b8" />
                  </div>
                </div>
                <div class="settings-grid">
                  <div class="field">
                    <label for="fontFamily">日志字体</label>
                    <select id="fontFamily">
                      <option value='"JetBrains Mono", "Cascadia Code", Consolas, monospace'>JetBrains Mono</option>
                      <option value='"Cascadia Code", Consolas, monospace'>Cascadia Code</option>
                      <option value='Consolas, "Cascadia Code", monospace'>Consolas</option>
                      <option value='"Source Code Pro", "Cascadia Code", Consolas, monospace'>Source Code Pro</option>
                      <option value='ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace'>系统等宽</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="fontSize">日志字号 (px)</label>
                    <input id="fontSize" type="number" min="10" max="24" step="1" value="13" />
                  </div>
                </div>
              </div>
              <div>
                <div class="preview-title">效果预览</div>
                <div class="terminal terminal-preview">
                  <div class="line">
                    <span class="token-letter">JUST testing</span><span class="token-punct">, </span><span class="token-digit">114514</span><span class="token-punct"> ?![]</span>
                  </div>
                  <div class="line">
                    <span class="token-letter">Temp</span><span class="token-punct">=</span><span class="token-digit">36</span><span class="token-punct">.</span><span class="token-digit">5</span><span class="token-letter">C</span>
                  </div>
                  <div class="line line-tx">
                    <span class="content">TX&gt;&gt; AT+RST</span>
                  </div>
                  <div class="line line-sys">
                    <span class="content">系统消息: 已断开连接</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
